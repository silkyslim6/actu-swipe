<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Actu Swipe</title>
<style>
  :root {
    --bg: #f0ede8;
    --card-bg: #ffffff;
    --text: #1a1a18;
    --muted: #6b6a65;
    --border: rgba(0,0,0,0.09);
    --pol-bg:#EEEDFE;--pol-t:#3C3489;
    --eco-bg:#E1F5EE;--eco-t:#085041;
    --spo-bg:#FAEEDA;--spo-t:#633806;
    --cin-bg:#FBEAF0;--cin-t:#72243E;
    --cul-bg:#E6F1FB;--cul-t:#0C447C;
    --tec-bg:#EAF3DE;--tec-t:#27500A;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#18181a;--card-bg:#26262a;--text:#e8e6e0;--muted:#9c9a92;--border:rgba(255,255,255,0.09);
      --pol-bg:#26215C;--pol-t:#CECBF6;
      --eco-bg:#04342C;--eco-t:#9FE1CB;
      --spo-bg:#412402;--spo-t:#FAC775;
      --cin-bg:#4B1528;--cin-t:#F4C0D1;
      --cul-bg:#042C53;--cul-t:#B5D4F4;
      --tec-bg:#173404;--tec-t:#C0DD97;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
  .app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;padding:0 0 20px;}

  .header{padding:20px 20px 10px;}
  .header-eyebrow{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
  .header-title{font-size:22px;font-weight:600;line-height:1.2;}

  .filters{padding:10px 16px 12px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;height:34px;padding:0 13px;border-radius:17px;border:1.5px solid transparent;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;gap:5px;white-space:nowrap;user-select:none;}
  .chip:active{transform:scale(0.94);}
  .chip.off{opacity:.38;}
  .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:0 16px 6px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;background:var(--text);transition:width .4s;}
  .counter{text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;min-height:18px;}

  .deck-area{padding:0 16px;}
  .deck{position:relative;height:490px;}

  .card{
    position:absolute;inset:0;
    background:var(--card-bg);
    border-radius:22px;
    border:0.5px solid var(--border);
    padding:22px 20px 18px;
    display:flex;flex-direction:column;gap:12px;
    cursor:grab;will-change:transform,opacity;
    user-select:none;
  }
  .card:active{cursor:grabbing;}
  .card.behind1{transform:scale(0.95) translateY(13px);opacity:.65;pointer-events:none;}
  .card.behind2{transform:scale(0.90) translateY(24px);opacity:.35;pointer-events:none;}
  .card.loading-card{pointer-events:none;}

  .card-meta{display:flex;align-items:center;justify-content:space-between;}
  .card-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:11px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  .card-geo{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
  .geo-dot{width:8px;height:8px;border-radius:50%;}
  .card-date{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
  .card-title{font-size:18px;font-weight:600;line-height:1.3;color:var(--text);}
  .card-body{font-size:13.5px;line-height:1.6;color:var(--muted);flex:1;overflow:hidden;}
  .card-body strong{color:var(--text);font-weight:500;}
  .card-source{font-size:11px;color:var(--muted);margin-top:4px;opacity:.7;}

  .hint-like,.hint-nope{position:absolute;top:26px;font-size:13px;font-weight:700;letter-spacing:.08em;border:2.5px solid;padding:4px 10px;border-radius:6px;opacity:0;pointer-events:none;text-transform:uppercase;}
  .hint-like{left:20px;color:#1D9E75;border-color:#1D9E75;transform:rotate(-10deg);}
  .hint-nope{right:20px;color:#E24B4A;border-color:#E24B4A;transform:rotate(10deg);}

  .loading-shimmer{flex:1;display:flex;flex-direction:column;gap:12px;justify-content:center;}
  .shimmer-line{height:14px;border-radius:7px;background:var(--border);animation:shimmer 1.4s infinite;}
  .shimmer-line.wide{width:100%;}
  .shimmer-line.med{width:70%;}
  .shimmer-line.short{width:45%;}
  .shimmer-title{height:22px;border-radius:7px;background:var(--border);animation:shimmer 1.4s infinite .1s;width:90%;margin-bottom:4px;}
  @keyframes shimmer{0%,100%{opacity:.4;}50%{opacity:.9;}}
  .loading-label{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;}

  .actions{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;}
  .action-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);background:var(--card-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:transform .1s,background .15s;}
  .action-btn:active{transform:scale(0.88);}
  .action-btn.skip{border-color:#F09595;}
  .action-btn.next{border-color:#9FE1CB;}

  .toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
  .toast.show{opacity:1;}

  .source-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-top:auto;padding-top:6px;border-top:0.5px solid var(--border);}
  .source-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-eyebrow">Actualités en direct</div>
    <div class="header-title">Actu Swipe</div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="counter" id="counter">Chargement…</div>

  <div class="deck-area">
    <div class="deck" id="deck"></div>
    <div class="actions">
      <div class="action-btn skip" id="btn-skip" title="Passer">&#x2715;</div>
      <div class="action-btn" id="btn-shuffle" title="Nouveau sujet" style="font-size:17px">&#x21BA;</div>
      <div class="action-btn next" id="btn-next" title="Lu">&#x2713;</div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
const THEMES = {
  politique:{label:'Politique',bg:'var(--pol-bg)',text:'var(--pol-t)'},
  economie: {label:'Economie', bg:'var(--eco-bg)',text:'var(--eco-t)'},
  sport:    {label:'Sport',    bg:'var(--spo-bg)',text:'var(--spo-t)'},
  cinema:   {label:'Cinema',   bg:'var(--cin-bg)',text:'var(--cin-t)'},
  culture:  {label:'Culture',  bg:'var(--cul-bg)',text:'var(--cul-t)'},
  tech:     {label:'Tech',     bg:'var(--tec-bg)',text:'var(--tec-t)'},
};
const QUERIES = {
  politique:['politique France 2026','elections municipales France 2026','presidentielle 2027','gouvernement Lecornu 2026','Marine Le Pen 2026'],
  economie: ['economie France 2026','droits douane Trump 2026','CAC40 bourse mars 2026','inflation France 2026','budget deficit France 2026'],
  sport:    ['JO Milan Cortina 2026 France','foot coupe monde 2026','Roland Garros 2026','rugby France XV 2026','athletisme France 2026'],
  cinema:   ['Oscars 2026 ceremonie','cinema France mars 2026','Cannes 2026','Cesar 2026','film francais 2026'],
  culture:  ['culture France 2026','exposition Paris 2026','livre francais 2026','musique France 2026','patrimoine France 2026'],
  tech:     ['IA actualite 2026','Mistral AI 2026','DeepSeek 2026','cybersecurite France 2026','startups tech France 2026'],
};

let activeThemes = new Set(Object.keys(THEMES));
let activeGeo    = new Set(['fr','world']);
let deckEls   = [];
let seenCount = 0;
let sessionId = 0;
let nextCard  = null;
let fetching  = false;

function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function randTheme(){ return rnd([...activeThemes]); }
function randGeo()  { return rnd([...activeGeo]); }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

function updateCounter(){
  document.getElementById('counter').textContent =
    'Carte '+(seenCount+1)+(nextCard?' · suivante prete':' · chargement suivante...');
}

function sanitize(html){
  return (html||'')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/<b>(.*?)<\/b>/gi,'<strong>$1</strong>');
}

// Fetch via /api/messages (with web search, for subsequent cards)
async function fetchCard(sid){
  if(sid!==sessionId||fetching) return;
  fetching=true;
  const theme=randTheme(), geo=randGeo();
  const q=rnd(QUERIES[theme]||QUERIES.politique);
  const geoStr=geo==='fr'?'France':'international';
  const sys=[
    'Tu es journaliste. Cherche une actualite recente (2025-2026).',
    'Reponds UNIQUEMENT avec un objet JSON valide sur une seule ligne, sans markdown, sans backtick, sans texte autour.',
    'Format: {"date":"JJ mois AAAA","title":"titre max 10 mots","body":"2-3 phrases. Noms propres entre balises strong.","source":"nom media","geo":"'+geo+'","theme":"'+theme+'"}'
  ].join(' ');
  try{
    const resp=await fetch('/api/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:sys,
        messages:[{role:'user',content:'Actualite '+THEMES[theme].label+' en '+geoStr+': '+q}]
      })
    });
    if(sid!==sessionId){fetching=false;return;}
    if(resp.status===429){fetching=false;setTimeout(()=>fetchCard(sid),8000);return;}
    if(!resp.ok){fetching=false;setTimeout(()=>fetchCard(sid),4000);return;}
    const data=await resp.json();
    if(sid!==sessionId){fetching=false;return;}
    let txt='';
    for(const b of (data.content||[])) if(b.type==='text'&&b.text) txt=b.text.trim();
    if(!txt){fetching=false;setTimeout(()=>fetchCard(sid),3000);return;}
    const clean=txt.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
    const card=JSON.parse(clean);
    card.theme=card.theme||theme; card.geo=card.geo||geo;
    card.body=sanitize(card.body);
    fetching=false;
    gotCard(card,sid);
  }catch(e){
    fetching=false;
    if(sid===sessionId) setTimeout(()=>fetchCard(sid),4000);
  }
}

function gotCard(card,sid){
  if(sid!==sessionId) return;
  nextCard=card;
  updateCounter();
  tryReplaceTopShimmer();
}

function tryReplaceTopShimmer(){
  if(!nextCard) return;
  const top=deckEls[deckEls.length-1];
  if(!top||!top.dataset.shimmer) return;
  const card=nextCard; nextCard=null;
  const el=makeCardEl(card);
  el.style.zIndex=top.style.zIndex;
  document.getElementById('deck').replaceChild(el,top);
  deckEls[deckEls.length-1]=el;
  rebuildStack();
  updateCounter();
}

function makeCardEl(data){
  const th=THEMES[data.theme]||THEMES.politique;
  const geo=data.geo||'fr';
  const gLabel=geo==='fr'?'France':'Monde';
  const gDot=geo==='fr'?'#0033a0':'#b5461b';
  const el=document.createElement('div');
  el.className='card';
  el.innerHTML=
    '<div class="card-meta">'+
      '<div class="card-pill" style="background:'+th.bg+';color:'+th.text+'">'+th.label+'</div>'+
      '<div class="card-geo"><div class="geo-dot" style="background:'+gDot+'"></div>'+gLabel+'</div>'+
    '</div>'+
    '<div class="card-date">'+(data.date||'')+'</div>'+
    '<div class="card-title">'+(data.title||'')+'</div>'+
    '<div class="card-body">'+(data.body||'')+'</div>'+
    (data.source?'<div class="source-badge"><div class="source-dot"></div>Source: '+data.source+'</div>':'')+
    '<div class="hint-like">Lu</div><div class="hint-nope">Passer</div>';
  attachSwipe(el);
  return el;
}

function makeShimmerEl(){
  const th=THEMES[randTheme()];
  const geo=randGeo();
  const el=document.createElement('div');
  el.className='card loading-card';
  el.dataset.shimmer='1';
  el.innerHTML=
    '<div class="card-meta">'+
      '<div class="card-pill" style="background:'+th.bg+';color:'+th.text+'">'+th.label+'</div>'+
      '<div class="card-geo"><div class="geo-dot" style="background:'+(geo==='fr'?'#0033a0':'#b5461b')+'"></div>'+(geo==='fr'?'France':'Monde')+'</div>'+
    '</div>'+
    '<div class="loading-shimmer">'+
      '<div class="shimmer-title"></div>'+
      '<div class="shimmer-line wide"></div>'+
      '<div class="shimmer-line wide"></div>'+
      '<div class="shimmer-line med"></div>'+
      '<div class="shimmer-line short"></div>'+
    '</div>'+
    '<div class="loading-label">Chargement en cours...</div>';
  return el;
}

function rebuildStack(){
  const n=deckEls.length;
  deckEls.forEach((c,i)=>{
    c.classList.remove('behind1','behind2');
    const d=n-1-i;
    if(d===1) c.classList.add('behind1');
    else if(d>=2) c.classList.add('behind2');
    c.style.zIndex=String(i+1);
  });
}

function addToDeck(el){
  document.getElementById('deck').appendChild(el);
  deckEls.push(el);
  rebuildStack();
}

function pushNext(){
  if(nextCard){
    const card=nextCard; nextCard=null;
    addToDeck(makeCardEl(card));
    updateCounter();
    if(!fetching) setTimeout(()=>fetchCard(sessionId),300);
  } else {
    addToDeck(makeShimmerEl());
    updateCounter();
    if(!fetching) fetchCard(sessionId);
  }
}

function dismissTop(dir){
  if(deckEls.length===0) return;
  const top=deckEls[deckEls.length-1];
  if(top.dataset.shimmer==='1') return;
  top.style.transition='transform .30s cubic-bezier(.4,0,.2,1),opacity .25s';
  top.style.transform='translateX('+(dir==='right'?'150%':'-150%')+') rotate('+(dir==='right'?'20':'-20')+'deg)';
  top.style.opacity='0';
  deckEls.splice(deckEls.length-1,1);
  seenCount++;
  rebuildStack();
  setTimeout(()=>{if(top.parentNode)top.remove();},320);
  pushNext();
}

function attachSwipe(el){
  let sx,sy,dx=0,active=false;
  const hl=el.querySelector('.hint-like');
  const hn=el.querySelector('.hint-nope');
  function onStart(x,y){sx=x;sy=y;dx=0;active=true;el.style.transition='none';}
  function onMove(x,y){
    if(!active) return;
    const ddx=x-sx,ddy=y-sy;
    if(Math.abs(ddy)>Math.abs(ddx)+14){active=false;return;}
    dx=ddx;
    el.style.transform='translateX('+dx+'px) rotate('+(dx*0.055)+'deg)';
    const r=Math.min(Math.abs(dx)/75,1);
    if(hl)hl.style.opacity=String(dx>0?r:0);
    if(hn)hn.style.opacity=String(dx<0?r:0);
  }
  function onEnd(){
    if(!active) return; active=false;
    if(hl)hl.style.opacity='0'; if(hn)hn.style.opacity='0';
    window.removeEventListener('mousemove',mmH);
    window.removeEventListener('mouseup',muH);
    if(Math.abs(dx)>75) dismissTop(dx>0?'right':'left');
    else{el.style.transition='transform .28s cubic-bezier(.4,0,.2,1)';el.style.transform='';}
  }
  function mmH(e){onMove(e.clientX,e.clientY);}
  function muH(){onEnd();}
  el.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);window.addEventListener('mousemove',mmH);window.addEventListener('mouseup',muH);});
  el.addEventListener('touchstart',e=>{const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:true});
  el.addEventListener('touchend',onEnd);
}

function buildFilters(){
  const wrap=document.getElementById('filters');
  wrap.innerHTML='';
  ['fr','world'].forEach(geo=>{
    const on=activeGeo.has(geo);
    const label=geo==='fr'?'France':'Monde';
    const dot=geo==='fr'?'#0033a0':'#b5461b';
    const bgOn=geo==='fr'?'#dce6fb':'#fbe8e1';
    const txOn=geo==='fr'?'#0033a0':'#8c3210';
    const c=document.createElement('div');
    c.className='chip'+(on?'':' off');
    c.style.cssText=on?'background:'+bgOn+';color:'+txOn+';border-color:'+bgOn:'background:transparent;color:var(--muted);border-color:var(--border)';
    c.innerHTML='<span class="chip-dot" style="background:'+dot+'"></span>'+label;
    c.onclick=()=>{if(activeGeo.has(geo)){if(activeGeo.size>1)activeGeo.delete(geo);}else activeGeo.add(geo);buildFilters();};
    wrap.appendChild(c);
  });
  Object.entries(THEMES).forEach(([key,th])=>{
    const on=activeThemes.has(key);
    const c=document.createElement('div');
    c.className='chip'+(on?'':' off');
    c.style.cssText=on?'background:'+th.bg+';color:'+th.text+';border-color:'+th.bg:'background:transparent;color:var(--muted);border-color:var(--border)';
    c.textContent=th.label;
    c.onclick=()=>{if(activeThemes.has(key)){if(activeThemes.size>1)activeThemes.delete(key);}else activeThemes.add(key);buildFilters();};
    wrap.appendChild(c);
  });
}

document.getElementById('btn-skip').onclick=()=>dismissTop('left');
document.getElementById('btn-next').onclick=()=>dismissTop('right');
document.getElementById('btn-shuffle').onclick=()=>{
  sessionId++;nextCard=null;fetching=false;
  document.getElementById('deck').innerHTML='';deckEls=[];seenCount=0;
  showToast('Nouvelles actus...');
  addToDeck(makeShimmerEl());
  updateCounter();
  fetchCard(sessionId);
};

buildFilters();

// Show shimmer immediately
addToDeck(makeShimmerEl());
updateCounter();

// Fetch first card from /api/firstcard (pre-fetched at page load by Vercel edge)
fetch('/api/firstcard')
  .then(r=>r.json())
  .then(card=>{
    if(card.error) throw new Error(card.error);
    card.body=sanitize(card.body||'');
    gotCard(card,sessionId);
    // Start prefetching card 2 right away
    setTimeout(()=>fetchCard(sessionId),300);
  })
  .catch(()=>{
    // Fallback to regular fetch
    fetchCard(sessionId);
  });
</script>
</body>
</html>
